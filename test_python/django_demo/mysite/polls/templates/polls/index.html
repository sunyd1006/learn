<!-- 现在，我们或许可以将模板直接放在polls/templates中（而不是再创建一个polls子目录），但实际上这并不是个好主意。Django会选择它找到的第一个名称匹配的模板，如果你在另一个不同的应用中有一个同名模板，Django将无法区分它们。我们需要能够指引Django找到正确的模板，而确保这一点的最佳方法是对它们进行命名空间处理。也就是说，将这些模板放在另一个以应用本身命名的目录中。 -->
{% if latest_question_list %}
    <ul>
    {% for question in latest_question_list %}
        <li><a href="{% url 'polls:detail' question.id %}">{{ question.question_text }}</a></li>
        <!-- 等价的写法, 但是前者更加的清晰, 因为它直接指向了 detail 视图 -->
        <li><a href="/polls/{{ question.id }}/">{{ question.question_text }}</a></li>
    {% endfor %}
    </ul>
{% else %}
    <p>No polls are available.</p>
{% endif %}
