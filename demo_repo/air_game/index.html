<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王牌机师：星域突击 - Ace Pilot: Star Assault</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-green: #39ef74;
            --neon-red: #ff3e3e;
            --neon-gold: #f9d423;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 游戏容器 */
        #game-container {
            position: relative;
            width: 480px;
            height: 700px;
            background: #000;
            border: 2px solid var(--glass);
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.2);
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* HUD 界面 */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
        }

        .value {
            font-size: 20px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* HP 条 */
        #hp-wrapper {
            width: 120px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #hp-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff3e3e, #ff7676);
            transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 10px #ff3e3e;
        }

        /* 道具计时器 */
        #powerup-list {
            position: absolute;
            top: 80px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            z-index: 10;
        }

        .powerup-timer {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 8px;
            border-radius: 4px;
            border-left: 3px solid #fff;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .timer-icon {
            font-size: 14px;
        }

        .timer-bar-bg {
            width: 60px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .timer-bar-fill {
            height: 100%;
            background: #fff;
            border-radius: 2px;
        }

        /* 开始 & 结束界面 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 15, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 30px;
            background: linear-gradient(to bottom, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 5px;
        }

        .start-hint {
            font-size: 16px;
            color: var(--neon-blue);
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            from {
                opacity: 0.3;
            }

            to {
                opacity: 1;
            }
        }

        .controls {
            margin-top: 40px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
        }

        /* Boss 血条 */
        #boss-ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            display: none;
            z-index: 10;
        }

        #boss-hp-bg {
            height: 6px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 0, 255, 0.5);
        }

        #boss-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #9d50bb, #6e48aa);
            width: 100%;
        }

        /* 统一按钮样式 */
        .btn {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
        }
    </style>
</head>

<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="480" height="700"></canvas>

        <!-- HUD 抬头显示 -->
        <div id="hud">
            <div class="stat-box">
                <div class="label">Score</div>
                <div id="score" class="value">000000</div>
                <div class="label" style="margin-top:5px">High Score</div>
                <div id="hi-score" class="value" style="font-size:14px">000000</div>
            </div>
            <div class="stat-box" style="align-items: flex-end;">
                <div class="label">Integrity</div>
                <div id="hp-wrapper">
                    <div id="hp-bar"></div>
                </div>
                <div id="lives" style="margin-top:4px; font-size:12px; color: var(--neon-blue);">SHIPS: 3</div>
            </div>
        </div>

        <!-- 道具状态列表 -->
        <div id="powerup-list"></div>

        <!-- Boss 战 UI -->
        <div id="boss-ui">
            <div class="label" style="text-align: center; margin-bottom: 4px; color: #ff00ff">WARNING: BOSS DETECTED
            </div>
            <div id="boss-hp-bg">
                <div id="boss-hp-fill"></div>
            </div>
        </div>

        <!-- 开始界面 -->
        <div id="start-screen" class="overlay">
            <h1>ACE PILOT</h1>
            <p class="start-hint">PRESS SPACE TO LAUNCH</p>
            <div class="controls">
                WASD / ARROW KEYS TO MOVE<br>
                AUTO-FIRE ENABLED<br>
                COLLECT POWER-UPS TO SURVIVE
            </div>
        </div>

        <!-- 结算界面 -->
        <div id="over-screen" class="overlay" style="display: none;">
            <h1 id="over-title" style="color: var(--neon-red)">MISSION FAILED</h1>
            <p>FINAL SCORE</p>
            <div id="final-score" class="value" style="font-size: 48px; margin-bottom: 30px;">0</div>
            <button class="btn" onclick="resetGame()">RETRY MISSION</button>
        </div>
    </div>

    <script>
        /**
         * 王牌机师：星域突击
         * 系统逻辑实现
         */

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;

        // 基础配置
        const CONFIG = {
            PLAYER_SPEED: 5,
            BULLET_SPEED: 12,
            ENEMY_BASE_SPEED: 2.5,
            SPAWN_INTERVAL: 1000, // ms
        };

        // 道具定义
        const POWERUP_TYPES = {
            SPEED: { color: '#ff3e3e', icon: '🔴', label: 'ATTACK SPEED', duration: 10000 },
            TRIPLE: { color: '#f9d423', icon: '🟡', label: 'TRIPLE SHOT', duration: 15000 },
            WIDE: { color: '#00d2ff', icon: '🔵', label: 'WIDE SPREAD', duration: 8000 },
            LASER: { color: '#39ef74', icon: '🟢', label: 'MEGA LASER', duration: 6000 },
            WINGMAN: { color: '#9d50bb', icon: '🟣', label: 'DRONE SUPPORT', duration: 20000 },
            WINGMAN_UP: { color: '#ffffff', icon: '⚪', label: 'DRONE UPGRADE', duration: 15000 },
            PIERCE: { color: '#ff9472', icon: '🟠', label: 'PIERCE AMMO', duration: 12000 },
            SHIELD: { color: '#00f2fe', icon: '💎', label: 'PLASMA SHIELD', duration: -1, hits: 3 }, // 堆叠扣除次数
            HEAL: { color: '#ff7eb3', icon: '❤️', label: 'REPAIR', type: 'instant' },
            BOMB: { color: '#ffcc33', icon: '⭐', label: 'SUPERNOVA', type: 'instant' }
        };

        // 游戏状态
        let state = {
            running: false,
            score: 0,
            hiScore: localStorage.getItem('ace_hi_score') || 0,
            hp: 100,
            lives: 3,
            level: 1,
            lastSpawn: 0,
            lastShoot: 0,
            keys: {},
            activePowerups: {}, // name -> { endTime, intensity, etc }
            entities: {
                player: null,
                enemies: [],
                bullets: [],
                enemyBullets: [],
                particles: [],
                items: [],
                stars: [],
                boss: null
            }
        };

        // 输入监听
        window.addEventListener('keydown', e => {
            state.keys[e.code] = true;
            if (e.code === 'Space' && !state.running) {
                startGame();
            }
        });
        window.addEventListener('keyup', e => state.keys[e.code] = false);

        /**
         * 工具类
         */
        const random = (min, max) => Math.random() * (max - min) + min;
        const distance = (x1, y1, x2, y2) => Math.hypot(x1 - x2, y1 - y2);

        /**
         * 实体类定义
         */

        class Star {
            constructor() {
                this.x = random(0, W);
                this.y = random(0, H);
                this.size = random(1, 3);
                this.speed = this.size * 0.8;
                this.color = `rgba(255, 255, 255, ${random(0.1, 0.6)})`;
            }
            update() {
                this.y += this.speed;
                if (this.y > H) {
                    this.y = -5;
                    this.x = random(0, W);
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = random(-4, 4);
                this.vy = random(-4, 4);
                this.life = 1.0;
                this.decay = random(0.01, 0.03);
                this.size = random(2, 5);
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }

        class Bullet {
            constructor(x, y, vx, vy, isPierce = false) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.isPierce = isPierce;
                this.active = true;
                this.w = 4;
                this.h = 12;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.y < -20 || this.y > H + 20 || this.x < -20 || this.x > W + 20) this.active = false;
            }
            draw() {
                ctx.fillStyle = this.isPierce ? '#ff9472' : '#00d2ff';
                ctx.shadowBlur = 8;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fillRect(this.x - this.w / 2, this.y, this.w, this.h);
                ctx.shadowBlur = 0;
            }
        }

        class EnemyBullet {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.size = 6;
                this.active = true;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.y > H + 20) this.active = false;
            }
            draw() {
                ctx.fillStyle = '#ff3e3e';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class PowerUp {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; // key from POWERUP_TYPES
                this.vy = 1.5;
                this.active = true;
                this.w = 26;
                this.h = 26;
                this.pulse = 0;
            }
            update() {
                this.y += this.vy;
                this.pulse += 0.1;
                if (this.y > H) this.active = false;
            }
            draw() {
                const cfg = POWERUP_TYPES[this.type];
                ctx.save();
                ctx.translate(this.x, this.y);

                // 外部光晕
                const s = 1 + Math.sin(this.pulse) * 0.2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = cfg.color;
                ctx.fillStyle = cfg.color;
                ctx.beginPath();
                ctx.arc(0, 0, (this.w / 2) * s, 0, Math.PI * 2);
                ctx.fill();

                // 内部图标
                ctx.fillStyle = '#fff';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(cfg.icon, 0, 0);

                ctx.restore();
            }
        }

        class Enemy {
            constructor(type = 'normal') {
                this.x = random(50, W - 50);
                this.y = -50;
                this.type = type;
                this.active = true;
                this.shootCooldown = random(60, 150);

                // 属性设定
                if (type === 'fast') {
                    this.hp = 1;
                    this.speed = (CONFIG.ENEMY_BASE_SPEED + 2.5) * (1 + state.level * 0.1);
                    this.color = '#ff3e3e';
                    this.w = 24; this.h = 24;
                } else if (type === 'heavy') {
                    this.hp = 10;
                    this.speed = (CONFIG.ENEMY_BASE_SPEED - 1) * (1 + state.level * 0.05);
                    this.color = '#9d50bb';
                    this.w = 50; this.h = 40;
                } else {
                    this.hp = 2;
                    this.speed = CONFIG.ENEMY_BASE_SPEED * (1 + state.level * 0.08);
                    this.color = '#f9d423';
                    this.w = 32; this.h = 32;
                }
            }
            update() {
                this.y += this.speed;
                if (this.y > H + 50) this.active = false;

                // 射击 AI
                if (this.shootCooldown <= 0 && state.entities.player) {
                    const p = state.entities.player;
                    const angle = Math.atan2(p.y - this.y, p.x - this.x);
                    state.entities.enemyBullets.push(new EnemyBullet(this.x, this.y + this.h / 2, Math.cos(angle) * 5, Math.sin(angle) * 5));
                    this.shootCooldown = random(100, 200);
                }
                this.shootCooldown--;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // 敌机外形 (简单的像素感矢量)
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(0, this.h / 2);
                ctx.lineTo(-this.w / 2, -this.h / 2);
                ctx.lineTo(this.w / 2, -this.h / 2);
                ctx.closePath();
                ctx.fill();

                // 排气火光
                ctx.fillStyle = 'rgba(255,100,0,0.5)';
                ctx.fillRect(-4, -this.h / 2 - 10, 8, 10);

                ctx.restore();
            }
        }

        class Boss {
            constructor() {
                this.x = W / 2;
                this.y = -150;
                this.maxHp = 200 + state.level * 100;
                this.hp = this.maxHp;
                this.speed = 1.5;
                this.targetY = 120;
                this.phase = 'entry';
                this.w = 120;
                this.h = 80;
                this.timers = { shoot: 0, move: 0 };
                this.moveDir = 1;
            }
            update() {
                if (this.phase === 'entry') {
                    this.y += this.speed;
                    if (this.y >= this.targetY) this.phase = 'fight';
                } else {
                    // 左右徘徊
                    this.x += this.moveDir * 2;
                    if (this.x < 100 || this.x > W - 100) this.moveDir *= -1;

                    // 弹幕射击
                    if (this.timers.shoot <= 0) {
                        const count = 12;
                        for (let i = 0; i < count; i++) {
                            const angle = (Math.PI * 2 / count) * i + (Date.now() / 1000);
                            state.entities.enemyBullets.push(new EnemyBullet(this.x, this.y, Math.cos(angle) * 4, Math.sin(angle) * 4));
                        }
                        this.timers.shoot = 60;
                    }
                    this.timers.shoot--;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Boss 船体
                ctx.fillStyle = '#6e48aa';
                ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
                ctx.strokeStyle = '#ff00ff';
                ctx.lineWidth = 3;
                ctx.strokeRect(-this.w / 2, -this.h / 2, this.w, this.h);

                // 发光核心
                const glow = Math.sin(Date.now() / 200) * 10;
                ctx.shadowBlur = 20 + glow;
                ctx.shadowColor = '#ff00ff';
                ctx.fillStyle = '#ff00ff';
                ctx.beginPath();
                ctx.arc(0, 0, 20, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        class Player {
            constructor() {
                this.x = W / 2;
                this.y = H - 80;
                this.w = 40;
                this.h = 40;
                this.shieldHits = 0;
                this.invincible = 0; // 帧数
            }
            update() {
                if (state.keys['KeyW'] || state.keys['ArrowUp']) this.y -= CONFIG.PLAYER_SPEED;
                if (state.keys['KeyS'] || state.keys['ArrowDown']) this.y += CONFIG.PLAYER_SPEED;
                if (state.keys['KeyA'] || state.keys['ArrowLeft']) this.x -= CONFIG.PLAYER_SPEED;
                if (state.keys['KeyD'] || state.keys['ArrowRight']) this.x += CONFIG.PLAYER_SPEED;

                // 限制边界
                this.x = Math.max(this.w / 2, Math.min(W - this.w / 2, this.x));
                this.y = Math.max(this.h / 2, Math.min(H - this.h / 2, this.y));

                if (this.invincible > 0) this.invincible--;

                // 自动射击
                let rate = state.activePowerups['SPEED'] ? 8 : 15;
                if (state.entities.bullets.length < 50 && (Date.now() - state.lastShoot > rate * 16)) {
                    this.shoot();
                    state.lastShoot = Date.now();
                }
            }
            shoot() {
                const bx = this.x;
                const by = this.y - this.h / 2;
                const isPierce = !!state.activePowerups['PIERCE'];

                // 激光特殊处理
                if (state.activePowerups['LASER']) {
                    // 激光在主循环中渲染和碰撞
                    return;
                }

                if (state.activePowerups['WIDE']) {
                    for (let i = -2; i <= 2; i++) {
                        state.entities.bullets.push(new Bullet(bx + i * 12, by, i * 2, -CONFIG.BULLET_SPEED, isPierce));
                    }
                } else if (state.activePowerups['TRIPLE']) {
                    state.entities.bullets.push(new Bullet(bx, by, 0, -CONFIG.BULLET_SPEED, isPierce));
                    state.entities.bullets.push(new Bullet(bx - 10, by + 5, -2, -CONFIG.BULLET_SPEED, isPierce));
                    state.entities.bullets.push(new Bullet(bx + 10, by + 5, 2, -CONFIG.BULLET_SPEED, isPierce));
                } else {
                    state.entities.bullets.push(new Bullet(bx, by, 0, -CONFIG.BULLET_SPEED, isPierce));
                }

                // 僚机同步射击
                if (state.activePowerups['WINGMAN']) {
                    const offset = 35;
                    state.entities.bullets.push(new Bullet(bx - offset, by + 15, 0, -CONFIG.BULLET_SPEED, isPierce));
                    state.entities.bullets.push(new Bullet(bx + offset, by + 15, 0, -CONFIG.BULLET_SPEED, isPierce));

                    if (state.activePowerups['WINGMAN_UP']) {
                        const offset2 = 60;
                        state.entities.bullets.push(new Bullet(bx - offset2, by + 25, 0, -CONFIG.BULLET_SPEED, isPierce));
                        state.entities.bullets.push(new Bullet(bx + offset2, by + 25, 0, -CONFIG.BULLET_SPEED, isPierce));
                    }
                }
            }
            draw() {
                if (this.invincible > 0 && Math.floor(this.invincible / 5) % 2 === 0) return;

                ctx.save();
                ctx.translate(this.x, this.y);

                // 绘制护盾
                if (state.activePowerups['SHIELD']) {
                    const hits = state.activePowerups['SHIELD'].hits;
                    ctx.beginPath();
                    ctx.arc(0, 0, 45, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(0, 242, 254, ${hits / 3})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00f2fe';
                }

                // 机身
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(0, -20);
                ctx.lineTo(-20, 20);
                ctx.lineTo(20, 20);
                ctx.closePath();
                ctx.fill();

                // 机翼细节
                ctx.fillStyle = varColor('--neon-blue');
                ctx.fillRect(-15, 5, 5, 10);
                ctx.fillRect(10, 5, 5, 10);

                // 引擎火光
                const engineH = 10 + Math.random() * 10;
                ctx.fillStyle = '#f9d423';
                ctx.fillRect(-12, 20, 6, engineH);
                ctx.fillRect(6, 20, 6, engineH);

                // 僚机渲染
                if (state.activePowerups['WINGMAN']) {
                    ctx.fillStyle = '#9d50bb';
                    ctx.fillRect(-40, 15, 10, 10);
                    ctx.fillRect(30, 15, 10, 10);
                    if (state.activePowerups['WINGMAN_UP']) {
                        ctx.fillRect(-65, 25, 10, 10);
                        ctx.fillRect(55, 25, 10, 10);
                    }
                }

                ctx.restore();
            }
        }

        /**
         * 游戏主循环逻辑
         */

        function startGame() {
            state.running = true;
            state.score = 0;
            state.hp = 100;
            state.lives = 3;
            state.level = 1;
            state.activePowerups = {};

            state.entities.player = new Player();
            state.entities.enemies = [];
            state.entities.bullets = [];
            state.entities.enemyBullets = [];
            state.entities.items = [];
            state.entities.particles = [];
            state.entities.boss = null;
            state.entities.stars = Array.from({ length: 80 }, () => new Star());

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('over-screen').style.display = 'none';

            requestAnimationFrame(update);
        }

        function update() {
            if (!state.running) return;

            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, W, H);

            // 背景
            state.entities.stars.forEach(s => { s.update(); s.draw(); });

            // 难度增强 (随时间/分数)
            state.level = 1 + Math.floor(state.score / 2000);

            // 生成敌机
            const now = Date.now();
            const spawnDelay = Math.max(300, 1200 - (state.level * 100));
            if (now - state.lastSpawn > spawnDelay && !state.entities.boss) {
                const rand = Math.random();
                let type = 'normal';
                if (state.level > 2 && rand > 0.7) type = 'fast';
                if (state.level > 4 && rand > 0.9) type = 'heavy';
                state.entities.enemies.push(new Enemy(type));
                state.lastSpawn = now;
            }

            // 定期生成 Boss
            if (state.score > 0 && state.score % 5000 < 100 && !state.entities.boss && state.level > 1) {
                state.entities.boss = new Boss();
                document.getElementById('boss-ui').style.display = 'block';
            }

            // 玩家更新
            const player = state.entities.player;
            if (player) {
                player.update();
                player.draw();

                // 激光渲染
                if (state.activePowerups['LASER']) {
                    ctx.save();
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#39ef74';
                    ctx.fillStyle = 'rgba(57, 239, 116, 0.4)';
                    ctx.fillRect(player.x - 10, 0, 20, player.y);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(player.x - 2, 0, 4, player.y);
                    ctx.restore();

                    // 激光碰撞
                    state.entities.enemies.forEach(e => {
                        if (Math.abs(e.x - player.x) < 25 && e.y < player.y) {
                            e.hp -= 0.5;
                        }
                    });
                    if (state.entities.boss) {
                        const b = state.entities.boss;
                        if (Math.abs(b.x - player.x) < b.w / 2 + 10 && b.y < player.y) {
                            b.hp -= 0.5;
                        }
                    }
                }
            }

            // 更新子弹
            state.entities.bullets.forEach(b => {
                b.update(); b.draw();
                state.entities.enemies.forEach(e => {
                    if (distance(b.x, b.y, e.x, e.y) < 25) {
                        e.hp--;
                        if (!b.isPierce) b.active = false;
                        spawnParticles(b.x, b.y, e.color, 5);
                        if (e.hp <= 0) {
                            onEnemyDeath(e);
                            e.active = false;
                        }
                    }
                });
                if (state.entities.boss) {
                    const bss = state.entities.boss;
                    if (b.x > bss.x - bss.w / 2 && b.x < bss.x + bss.w / 2 && b.y > bss.y - bss.h / 2 && b.y < bss.y + bss.h / 2) {
                        bss.hp--;
                        b.active = false;
                        spawnParticles(b.x, b.y, '#ff00ff', 5);
                    }
                }
            });

            // 更新敌机
            state.entities.enemies.forEach(e => {
                e.update(); e.draw();
                if (player && player.invincible <= 0 && distance(e.x, e.y, player.x, player.y) < 30) {
                    takeDamage(25);
                    e.active = false;
                    spawnParticles(e.x, e.y, e.color, 15);
                }
            });

            // 敌方子弹
            state.entities.enemyBullets.forEach(eb => {
                eb.update(); eb.draw();
                if (player && player.invincible <= 0 && distance(eb.x, eb.y, player.x, player.y) < 15) {
                    takeDamage(10);
                    eb.active = false;
                }
            });

            // Boss 更新
            if (state.entities.boss) {
                const b = state.entities.boss;
                b.update(); b.draw();
                document.getElementById('boss-hp-fill').style.width = (b.hp / b.maxHp) * 100 + '%';
                if (b.hp <= 0) {
                    state.score += 2000;
                    spawnParticles(b.x, b.y, '#ff00ff', 100);
                    // Boss 掉落高级道具
                    const highTier = ['WINGMAN', 'WINGMAN_UP', 'LASER', 'BOMB'];
                    spawnPowerUp(b.x, b.y, highTier[Math.floor(Math.random() * highTier.length)]);
                    state.entities.boss = null;
                    document.getElementById('boss-ui').style.display = 'none';
                }
            }

            // 道具更新
            state.entities.items.forEach(i => {
                i.update(); i.draw();
                if (player && distance(i.x, i.y, player.x, player.y) < 35) {
                    activatePowerup(i.type);
                    i.active = false;
                    state.score += 50;
                }
            });

            // 粒子更新
            state.entities.particles.forEach(p => { p.update(); p.draw(); });

            // 清理失效实体
            state.entities.bullets = state.entities.bullets.filter(e => e.active);
            state.entities.enemyBullets = state.entities.enemyBullets.filter(e => e.active);
            state.entities.enemies = state.entities.enemies.filter(e => e.active);
            state.entities.items = state.entities.items.filter(e => e.active);
            state.entities.particles = state.entities.particles.filter(e => e.life > 0);

            updateUI();
            requestAnimationFrame(update);
        }

        /**
         * 系统逻辑
         */

        function onEnemyDeath(e) {
            state.score += 100;
            spawnParticles(e.x, e.y, e.color, 20);
            // 道具掉落概率
            if (Math.random() < 0.15) {
                const types = Object.keys(POWERUP_TYPES);
                spawnPowerUp(e.x, e.y, types[Math.floor(Math.random() * types.length)]);
            }
        }

        function spawnPowerUp(x, y, type) {
            state.entities.items.push(new PowerUp(x, y, type));
        }

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                state.entities.particles.push(new Particle(x, y, color));
            }
        }

        function activatePowerup(type) {
            const cfg = POWERUP_TYPES[type];
            if (cfg.type === 'instant') {
                if (type === 'HEAL') {
                    state.hp = Math.min(100, state.hp + 30);
                } else if (type === 'BOMB') {
                    state.entities.enemies.forEach(e => {
                        state.score += 50;
                        spawnParticles(e.x, e.y, e.color, 20);
                    });
                    state.entities.enemies = [];
                    state.entities.enemyBullets = [];
                    spawnParticles(W / 2, H / 2, '#fff', 50);
                }
                return;
            }

            if (type === 'SHIELD') {
                state.activePowerups[type] = { hits: 3, endTime: -1 };
            } else {
                state.activePowerups[type] = {
                    endTime: Date.now() + cfg.duration,
                    total: cfg.duration
                };
            }
        }

        function takeDamage(amt) {
            if (state.activePowerups['SHIELD']) {
                state.activePowerups['SHIELD'].hits--;
                spawnParticles(state.entities.player.x, state.entities.player.y, '#00d2ff', 10);
                if (state.activePowerups['SHIELD'].hits <= 0) {
                    delete state.activePowerups['SHIELD'];
                }
                return;
            }

            state.hp -= amt;
            state.entities.player.invincible = 60; // 1秒无敌
            spawnParticles(state.entities.player.x, state.entities.player.y, '#fff', 20);

            if (state.hp <= 0) {
                state.lives--;
                if (state.lives > 0) {
                    state.hp = 100;
                } else {
                    gameOver();
                }
            }
        }

        function updateUI() {
            // 更新 Score
            document.getElementById('score').textContent = String(state.score).padStart(6, '0');
            if (state.score > state.hiScore) {
                state.hiScore = state.score;
                localStorage.setItem('ace_hi_score', state.hiScore);
            }
            document.getElementById('hi-score').textContent = String(state.hiScore).padStart(6, '0');

            // 更新 HP
            document.getElementById('hp-bar').style.width = Math.max(0, state.hp) + '%';
            document.getElementById('lives').textContent = `SHIPS: ${state.lives}`;

            // 更新道具计时器
            const list = document.getElementById('powerup-list');
            list.innerHTML = '';
            const now = Date.now();

            for (let key in state.activePowerups) {
                const p = state.activePowerups[key];
                const cfg = POWERUP_TYPES[key];

                if (p.endTime === -1) { // 护盾按次数显示
                    const div = document.createElement('div');
                    div.className = 'powerup-timer';
                    div.style.borderLeftColor = cfg.color;
                    div.innerHTML = `<span class="timer-icon">${cfg.icon}</span><span style="font-size:10px">${p.hits} HITS</span>`;
                    list.appendChild(div);
                    continue;
                }

                const remain = p.endTime - now;
                if (remain <= 0) {
                    delete state.activePowerups[key];
                    continue;
                }

                const div = document.createElement('div');
                div.className = 'powerup-timer';
                div.style.borderLeftColor = cfg.color;
                const percent = (remain / p.total) * 100;
                div.innerHTML = `
                <span class="timer-icon">${cfg.icon}</span>
                <div class="stat-box">
                    <span style="font-size:9px">${cfg.label}</span>
                    <div class="timer-bar-bg"><div class="timer-bar-fill" style="width:${percent}%; background:${cfg.color}"></div></div>
                </div>
            `;
                list.appendChild(div);
            }
        }

        function gameOver() {
            state.running = false;
            document.getElementById('over-screen').style.display = 'flex';
            document.getElementById('final-score').textContent = state.score;
        }

        function resetGame() {
            startGame();
        }

        // 辅助：获取 CSS 变量
        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

    </script>
</body>
